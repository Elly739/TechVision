<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Cost Estimator | TechVision</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Main navigation">
            <a class="brand" href="index.html"><img src="assets/logo.svg" alt="TechVision"></a>
            <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"><span></span><span></span><span></span></button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="estimator.html" aria-current="page">Cost Estimator</a>
                <a class="nav-cta" href="contact.html">Start a Project</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <p class="eyebrow">Tools</p>
            <h1>Project Cost Estimator</h1>
            <p>Get a quick estimate for your project based on features and complexity.</p>
        </section>

        <section class="form-layout">
            <article class="wide-card">
                <div>
                    <img class="service-icon" src="assets/icon-web.svg" alt="">
                    <h2>Estimate Your Project</h2>
                </div>
                <form class="project-form" id="estimatorForm">
                    <div class="form-row">
                        <label for="pages">Number of Pages/Views <span style="color: var(--muted); font-weight: normal;">(e.g., 5)</span></label>
                        <input type="number" id="pages" placeholder="Enter number of pages" min="1" value="5">
                    </div>
                    <div class="form-row">
                        <label for="complexity">Complexity Level <span style="color: var(--muted); font-weight: normal;">(1=Basic, 5=Complex)</span></label>
                        <input type="range" id="complexity" min="1" max="5" value="3" oninput="updateComplexity(this.value)">
                        <output id="complexityOutput" for="complexity" style="display: block; margin-top: 8px; font-weight: 600; color: var(--brand-dark);">Medium (3)</output>
                    </div>
                    <div class="form-row">
                        <label for="features">Key Features</label>
                        <select id="features">
                            <option value="5">Basic (forms, static content)</option>
                            <option value="10" selected>Standard (+database, auth)</option>
                            <option value="15">Advanced (+API, integrations)</option>
                            <option value="20">Premium (+realtime, payments)</option>
                        </select>
                    </div>
                    <div class="form-row full">
                        <button class="button primary" type="button" onclick="calculateEstimate()">Calculate Estimate</button>
                    </div>
                    <div class="form-row full" id="estimateResult" style="padding: 24px; background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%); border-radius: 8px; display: none; color: white;">
                        <p style="margin: 0; font-size: 1.2rem;"><strong>Estimated Range:</strong></p>
                        <p id="estimateValue" style="margin: 8px 0 0; font-size: 1.8rem; font-weight: 800;"></p>
                        <p style="margin: 4px 0 0; font-size: 0.9rem; opacity: 0.9;">Based on TechVision pricing</p>
                    </div>
                </form>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 TechVision. Nairobi, Kenya.</p>
        <a href="mailto:info@techvision.com">info@techvision.com</a>
    </footer>

    <script src="script.js"></script>
    <script>
        function updateComplexity(val) {
            const labels = {1: 'Very Basic', 2: 'Basic', 3: 'Medium', 4: 'High', 5: 'Very Complex'};
            document.getElementById('complexityOutput').textContent = labels[val] + ' (' + val + ')';
        }

        function calculateEstimate() {
            const pages = parseInt(document.getElementById('pages').value) || 0;
            const complexity = parseInt(document.getElementById('complexity').value) || 1;
            const features = parseInt(document.getElementById('features').value) || 0;

            if (pages <= 0) {
                document.getElementById('estimateValue').textContent = 'Please enter valid page count';
                document.getElementById('estimateResult').style.display = 'block';
                return;
            }

            const baseMin = pages * complexity * 500;
            const baseMax = pages * complexity * 1000;
            const featureMin = features * 1000;
            const featureMax = features * 2000;

            const minEstimate = baseMin + featureMin;
            const maxEstimate = baseMax + featureMax;

            document.getElementById('estimateValue').textContent = '$' + minEstimate.toLocaleString() + ' - $' + maxEstimate.toLocaleString();
            document.getElementById('estimateResult').style.display = 'block';
        }

        updateComplexity(3);
    </script>
</body>
</html>
